version: 2

sources:
  - name: raw
    database: AIRSTATS
    schema: RAW
    tables:
      - name: airports
        description: Global airport data (~72K rows)
        columns:
          - name: id
          - name: ident
          - name: type
          - name: name
          - name: latitude_deg
          - name: longitude_deg
          - name: elevation_ft
          - name: continent
          - name: iso_country
          - name: iso_region
          - name: municipality
          - name: scheduled_service
          - name: gps_code
          - name: iata_code
          - name: local_code
          - name: home_link
          - name: wikipedia_link
          - name: keywords

      - name: runways
        description: Runway information (~44K rows)
        columns:
          - name: id
          - name: airport_ref
          - name: airport_ident
          - name: length_ft
          - name: width_ft
          - name: surface
          - name: lighted
          - name: closed
          - name: le_ident
          - name: le_latitude_deg
          - name: le_longitude_deg
          - name: le_elevation_ft
          - name: le_heading_degT
          - name: le_displaced_threshold_ft
          - name: he_ident
          - name: he_latitude_deg
          - name: he_longitude_deg
          - name: he_elevation_ft
          - name: he_heading_degT
          - name: he_displaced_threshold_ft

  - name: comments
    database: AIRSTATS
    schema: RAW
    tables:
      - name: airport_comments
        description: User comments about airports
        columns:
          - name: id
          - name: airport_ref
          - name: airport_ident
          - name: date
          - name: member_nickname
          - name: subject
          - name: body
